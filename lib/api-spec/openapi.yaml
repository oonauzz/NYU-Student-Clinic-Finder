openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clinics
    description: Alternative clinic directory
  - name: insurance
    description: NYU student health insurance info
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /clinics:
    get:
      operationId: listClinics
      tags: [clinics]
      summary: List alternative clinics
      description: Returns clinics, optionally filtered by specialty, neighborhood, or NYU insurance acceptance
      parameters:
        - name: specialty
          in: query
          required: false
          schema:
            type: string
        - name: neighborhood
          in: query
          required: false
          schema:
            type: string
        - name: acceptsNyuInsurance
          in: query
          required: false
          schema:
            type: boolean
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of clinics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Clinic"
  /clinics/{id}:
    get:
      operationId: getClinic
      tags: [clinics]
      summary: Get a single clinic
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Clinic detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clinics/summary:
    get:
      operationId: getClinicsSummary
      tags: [clinics]
      summary: Aggregate stats about the clinic directory
      description: Counts, average wait time, and specialty breakdown for dashboard-style widgets
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicsSummary"
  /clinics/specialties:
    get:
      operationId: listSpecialties
      tags: [clinics]
      summary: List distinct specialties available across clinics
      responses:
        "200":
          description: List of specialty names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /clinics/neighborhoods:
    get:
      operationId: listNeighborhoods
      tags: [clinics]
      summary: List distinct neighborhoods available across clinics
      responses:
        "200":
          description: List of neighborhood names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /clinics/{id}/doctors:
    get:
      operationId: listClinicDoctors
      tags: [clinics]
      summary: List doctors at a clinic
      description: Returns doctors at this clinic, ordered from earliest to latest next available appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"
  /clinics/{id}/reviews:
    get:
      operationId: listClinicReviews
      tags: [clinics]
      summary: List reviews and wait time reports for a clinic
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of reviews, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createClinicReview
      tags: [clinics]
      summary: Submit a review and/or wait time report for a clinic
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Clinic not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clinics/{id}/doctors/{doctorId}/appointments:
    post:
      operationId: bookAppointment
      tags: [clinics]
      summary: Book an appointment with a doctor at their next available slot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: doctorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Booked appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Clinic or doctor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /insurance-plans:
    get:
      operationId: listInsurancePlans
      tags: [insurance]
      summary: List NYU student health insurance plan info
      responses:
        "200":
          description: List of insurance plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InsurancePlan"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Clinic:
      type: object
      required:
        - id
        - name
        - specialty
        - neighborhood
        - address
        - phone
        - averageWaitDays
        - acceptsNyuInsurance
        - rating
        - distanceFromCampusMiles
        - hours
        - notes
        - walkInAvailable
      properties:
        id:
          type: integer
        name:
          type: string
        specialty:
          type: string
        neighborhood:
          type: string
        address:
          type: string
        phone:
          type: string
        averageWaitDays:
          type: number
          description: Typical days to get an appointment (vs. ~21 days at NYU clinics)
        acceptsNyuInsurance:
          type: boolean
        rating:
          type: number
        distanceFromCampusMiles:
          type: number
        hours:
          type: string
        notes:
          type: string
        walkInAvailable:
          type: boolean
    ClinicsSummary:
      type: object
      required:
        - totalClinics
        - averageWaitDays
        - walkInCount
        - specialtyBreakdown
      properties:
        totalClinics:
          type: integer
        averageWaitDays:
          type: number
        walkInCount:
          type: integer
        specialtyBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/SpecialtyCount"
    SpecialtyCount:
      type: object
      required:
        - specialty
        - count
      properties:
        specialty:
          type: string
        count:
          type: integer
    Doctor:
      type: object
      required:
        - id
        - clinicId
        - name
        - title
        - nextAvailableAt
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        name:
          type: string
        title:
          type: string
          description: e.g. "MD, Family Medicine"
        nextAvailableAt:
          type: string
          format: date-time
          description: Soonest open appointment slot for this doctor
    Review:
      type: object
      required:
        - id
        - clinicId
        - authorName
        - rating
        - createdAt
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        authorName:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        reportedWaitDays:
          type: number
          nullable: true
          description: Wait time in days the reviewer actually experienced, if reported
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    ReviewInput:
      type: object
      required:
        - authorName
        - rating
      properties:
        authorName:
          type: string
          minLength: 1
          maxLength: 80
        rating:
          type: integer
          minimum: 1
          maximum: 5
        reportedWaitDays:
          type: number
          nullable: true
        comment:
          type: string
          nullable: true
          maxLength: 1000
    InsurancePlan:
      type: object
      required:
        - id
        - name
        - description
        - annualPremium
        - waivable
        - keyBenefits
        - isNyuPlan
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        annualPremium:
          type: number
        waivable:
          type: boolean
        keyBenefits:
          type: array
          items:
            type: string
        isNyuPlan:
          type: boolean
          description: True if this is an official NYU-billed plan; false for popular alternative plans students carry instead
    Appointment:
      type: object
      required:
        - id
        - clinicId
        - doctorId
        - doctorName
        - patientName
        - patientEmail
        - appointmentAt
        - status
        - createdAt
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        doctorId:
          type: integer
        doctorName:
          type: string
        patientName:
          type: string
        patientEmail:
          type: string
        patientPhone:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        appointmentAt:
          type: string
          format: date-time
        status:
          type: string
        createdAt:
          type: string
          format: date-time
    AppointmentInput:
      type: object
      required:
        - patientName
        - patientEmail
      properties:
        patientName:
          type: string
          minLength: 1
          maxLength: 120
        patientEmail:
          type: string
          format: email
        patientPhone:
          type: string
          nullable: true
          maxLength: 40
        notes:
          type: string
          nullable: true
          maxLength: 500

