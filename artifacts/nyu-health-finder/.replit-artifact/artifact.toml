kind = "web"
previewPath = "/"
title = "NYU Health Finder"
version = "1.0.0"
id = "artifacts/nyu-health-finder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20456

[services.development]
run = "pnpm --filter @workspace/nyu-health-finder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nyu-health-finder", "run", "build" ]
publicDir = "artifacts/nyu-health-finder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20456"
BASE_PATH = "/"
